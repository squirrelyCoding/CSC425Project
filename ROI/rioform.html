<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROI Form</title>
    <script src="./rio.js" defer></script>
</head>
<body>
    <h1>ROI Calculator</h1>
    <form id="roi-form">
        <label for="revenue">Projected Revenue:</label>
        <input type="number" id="revenue" required>
        <br>
        <label for="investment">Total Investment:</label>
        <input type="number" id="investment" required>
        <br>
        <button type="button" id="calculate">Calculate</button>
    </form>
    <h2>Results</h2>
    <p id="roi">ROI: </p>
    <p id="risk">Risk Assessment: </p>
    <p id="decision">Decision: </p>
</body>
</html>
